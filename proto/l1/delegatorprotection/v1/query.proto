syntax = "proto3";
package l1.delegatorprotection.v1;

import "google/api/annotations.proto";

option go_package = "github.com/sovereign-l1/l1/x/delegator-protection/types/delegatorprotectionpb";

service Query {
  rpc ProtectionFund(QueryProtectionFundRequest) returns (QueryProtectionFundResponse) {
    option (google.api.http).get = "/l1/delegatorprotection/v1/fund";
  }
  rpc ProtectionClaims(QueryProtectionClaimsRequest) returns (QueryProtectionClaimsResponse) {
    option (google.api.http).get = "/l1/delegatorprotection/v1/claims";
  }
  rpc DelegatorCompensation(QueryDelegatorCompensationRequest) returns (QueryDelegatorCompensationResponse) {
    option (google.api.http).get = "/l1/delegatorprotection/v1/compensation/{delegator}";
  }
  rpc ProtectionParams(QueryProtectionParamsRequest) returns (QueryProtectionParamsResponse) {
    option (google.api.http).get = "/l1/delegatorprotection/v1/params";
  }
}

message QueryProtectionFundRequest {}
message QueryProtectionFundResponse { string fund_json = 1; }

message QueryProtectionClaimsRequest {
  string delegator = 1;
  string status = 2;
}

message QueryProtectionClaimsResponse { string claims_json = 1; }

message QueryDelegatorCompensationRequest { string delegator = 1; }
message QueryDelegatorCompensationResponse { string payouts_json = 1; }

message QueryProtectionParamsRequest {}
message QueryProtectionParamsResponse { string params_json = 1; }
