syntax = "proto3";
package l1.scheduler.v1;

import "l1/scheduler/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/x/scheduler/types";

message MsgUpdateParams {
  string authority = 1;
  Params params = 2;
  SchedulerParams scheduler_params = 3;
}

message MsgUpdateParamsResponse {}

message MsgRegisterScheduledJob {
  string authority = 1;
  ScheduledJob job = 2;
}

message MsgRegisterScheduledJobResponse {}

message MsgPauseScheduledJob {
  string authority = 1;
  string owner_module = 2;
  string job_id = 3;
}

message MsgPauseScheduledJobResponse {}

message MsgResumeScheduledJob {
  string authority = 1;
  string owner_module = 2;
  string job_id = 3;
}

message MsgResumeScheduledJobResponse {}

message MsgCancelScheduledJob {
  string authority = 1;
  string owner_module = 2;
  string job_id = 3;
}

message MsgCancelScheduledJobResponse {}

message MsgExecuteDueJobs {
  string authority = 1;
  uint64 current_height = 2;
}

message MsgExecuteDueJobsResponse {
  ExecutionBatchResult result = 1;
}

message ExecutionBatchResult {
  uint64 height = 1;
  uint32 executed_jobs = 2;
  uint32 skipped_jobs = 3;
  uint64 gas_reserved = 4;
  uint64 gas_used = 5;
  repeated JobHistoryRecord history = 6;
  repeated ScheduledJob remaining_due = 7;
}

service Msg {
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc RegisterScheduledJob(MsgRegisterScheduledJob) returns (MsgRegisterScheduledJobResponse);
  rpc PauseScheduledJob(MsgPauseScheduledJob) returns (MsgPauseScheduledJobResponse);
  rpc ResumeScheduledJob(MsgResumeScheduledJob) returns (MsgResumeScheduledJobResponse);
  rpc CancelScheduledJob(MsgCancelScheduledJob) returns (MsgCancelScheduledJobResponse);
  rpc ExecuteDueJobs(MsgExecuteDueJobs) returns (MsgExecuteDueJobsResponse);
}
