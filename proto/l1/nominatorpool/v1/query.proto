syntax = "proto3";

package l1.nominatorpool.v1;

import "l1/nominatorpool/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/api/l1/nominatorpool/v1;nominatorpoolv1";

service Query {
  rpc NominatorPool(QueryNominatorPoolRequest) returns (QueryNominatorPoolResponse);
  rpc NominatorPools(QueryNominatorPoolsRequest) returns (QueryNominatorPoolsResponse);
  rpc PoolDelegator(QueryPoolDelegatorRequest) returns (QueryPoolDelegatorResponse);
  rpc PoolRewards(QueryPoolRewardsRequest) returns (QueryPoolRewardsResponse);
  rpc PoolShare(QueryPoolShareRequest) returns (QueryPoolShareResponse);
  rpc PoolAllocations(QueryPoolAllocationsRequest) returns (QueryPoolAllocationsResponse);
  rpc StakingRewards(QueryStakingRewardsRequest) returns (QueryStakingRewardsResponse);
  rpc StakingProof(QueryStakingProofRequest) returns (QueryStakingProofResponse);
  rpc PoolUnbondingQueue(QueryPoolUnbondingQueueRequest) returns (QueryPoolUnbondingQueueResponse);
}

message QueryNominatorPoolRequest {
  string pool_id = 1;
}

message QueryNominatorPoolResponse {
  NominatorPool pool = 1;
}

message QueryNominatorPoolsRequest {}

message QueryNominatorPoolsResponse {
  repeated NominatorPool pools = 1;
}

message QueryPoolDelegatorRequest {
  string pool_id = 1;
  string delegator = 2;
}

message QueryPoolDelegatorResponse {
  DelegatorShare delegator = 1;
}

message QueryPoolRewardsRequest {
  string pool_id = 1;
  string delegator = 2;
}

message QueryPoolRewardsResponse {
  uint64 reward_amount = 1;
}

message QueryPoolShareRequest {
  string pool_id = 1;
  string delegator = 2;
}

message QueryPoolShareResponse {
  DelegatorShare share = 1;
  uint64 pending_rewards = 2;
}

message QueryPoolAllocationsRequest {
  string pool_id = 1;
}

message QueryPoolAllocationsResponse {
  repeated ValidatorRewardAllocation allocations = 1;
}

message QueryStakingRewardsRequest {
  string delegator = 1;
  string validator = 2;
  bool internal_migration = 3;
}

message QueryStakingRewardsResponse {
  uint64 reward_amount = 1;
}

message QueryStakingProofRequest {
  string kind = 1;
  uint64 height = 2;
  string pool_id = 3;
  string account = 4;
  uint64 epoch = 5;
  string app_hash = 6;
  string root_hash = 7;
}

message QueryStakingProofResponse {
  string metadata_json = 1;
}

message QueryPoolUnbondingQueueRequest {
  string pool_id = 1;
}

message QueryPoolUnbondingQueueResponse {
  repeated UnbondingEntry unbonding_queue = 1;
}
