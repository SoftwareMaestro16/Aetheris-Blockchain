syntax = "proto3";

package l1.nominatorpool.v1;

import "l1/nominatorpool/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/api/l1/nominatorpool/v1;nominatorpoolv1";

service Msg {
  rpc CreateNominatorPool(MsgCreateNominatorPool) returns (MsgCreateNominatorPoolResponse);
  rpc DepositToPool(MsgDepositToPool) returns (MsgDepositToPoolResponse);
  rpc RequestPoolWithdrawal(MsgRequestPoolWithdrawal) returns (MsgRequestPoolWithdrawalResponse);
  rpc CancelPoolWithdrawal(MsgCancelPoolWithdrawal) returns (MsgCancelPoolWithdrawalResponse);
  rpc ClaimPoolRewards(MsgClaimPoolRewards) returns (MsgClaimPoolRewardsResponse);
  rpc SyncPoolRewards(MsgSyncPoolRewards) returns (MsgSyncPoolRewardsResponse);
  rpc ClaimStakingRewards(MsgClaimStakingRewards) returns (MsgClaimStakingRewardsResponse);
  rpc UpdatePoolCommission(MsgUpdatePoolCommission) returns (MsgUpdatePoolCommissionResponse);
  rpc ChangePoolValidator(MsgChangePoolValidator) returns (MsgChangePoolValidatorResponse);
}

message MsgCreateNominatorPool {
  string authority = 1;
  string pool_id = 2;
  string pool_operator = 3;
  string validator_target = 4;
  uint32 pool_commission_bps = 5;
  uint64 height = 6;
  string validator_status = 7;
}

message MsgCreateNominatorPoolResponse {
  NominatorPool pool = 1;
}

message MsgDepositToPool {
  string authority = 1;
  string pool_id = 2;
  string delegator = 3;
  uint64 amount = 4;
  uint64 height = 5;
}

message MsgDepositToPoolResponse {
  DelegatorShare delegator = 1;
}

message MsgRequestPoolWithdrawal {
  string authority = 1;
  string pool_id = 2;
  string withdrawal_id = 3;
  string delegator = 4;
  uint64 shares = 5;
  uint64 height = 6;
}

message MsgRequestPoolWithdrawalResponse {
  PendingWithdrawal withdrawal = 1;
}

message MsgCancelPoolWithdrawal {
  string authority = 1;
  string pool_id = 2;
  string withdrawal_id = 3;
  string delegator = 4;
  uint64 height = 5;
}

message MsgCancelPoolWithdrawalResponse {
  PendingWithdrawal withdrawal = 1;
}

message MsgClaimPoolRewards {
  string authority = 1;
  string pool_id = 2;
  string delegator = 3;
  uint64 height = 4;
}

message MsgClaimPoolRewardsResponse {
  uint64 reward_amount = 1;
}

message MsgSyncPoolRewards {
  string authority = 1;
  string pool_id = 2;
  uint64 epoch = 3;
  uint32 reward_rate_bps = 4;
  uint64 emissions_allocated = 5;
  uint64 fees_allocated = 6;
  uint64 height = 7;
  repeated ValidatorRewardAllocation allocations = 8;
}

message MsgSyncPoolRewardsResponse {
  uint64 pool_user_rewards = 1;
  uint64 validator_commission = 2;
  uint64 pool_protocol_fee = 3;
  uint64 reward_index_after = 4;
}

message MsgClaimStakingRewards {
  string authority = 1;
  string delegator = 2;
  string validator = 3;
  uint64 height = 4;
  bool internal_migration = 5;
}

message MsgClaimStakingRewardsResponse {
  uint64 reward_amount = 1;
}

message MsgUpdatePoolCommission {
  string authority = 1;
  string pool_id = 2;
  string pool_operator = 3;
  uint32 pool_commission_bps = 4;
  uint64 height = 5;
}

message MsgUpdatePoolCommissionResponse {
  NominatorPool pool = 1;
}

message MsgChangePoolValidator {
  string authority = 1;
  string pool_id = 2;
  string pool_operator = 3;
  string validator_target = 4;
  string validator_status = 5;
  uint64 height = 6;
}

message MsgChangePoolValidatorResponse {
  NominatorPool pool = 1;
}
