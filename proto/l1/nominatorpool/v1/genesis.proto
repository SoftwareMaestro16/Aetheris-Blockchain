syntax = "proto3";

package l1.nominatorpool.v1;

option go_package = "github.com/sovereign-l1/l1/api/l1/nominatorpool/v1;nominatorpoolv1";

message Params {
  string authority = 1;
  uint32 max_pools = 2;
  uint32 max_delegators = 3;
  uint32 max_pending_deposits = 4;
  uint32 max_pending_withdrawals = 5;
  uint32 max_unbonding_entries = 6;
  uint32 max_pool_id_bytes = 7;
  uint32 max_commission_bps = 8;
  uint64 unbonding_blocks = 9;
  uint64 validator_change_delay = 10;
  uint32 max_validator_commission_bps = 11;
  uint32 max_operator_performance_bonus_bps = 12;
}

message PendingDeposit {
  string delegator = 1;
  uint64 amount = 2;
  uint64 height = 3;
}

message PendingWithdrawal {
  string withdrawal_id = 1;
  string delegator = 2;
  uint64 shares = 3;
  uint64 amount = 4;
  uint64 request_height = 5;
  uint64 complete_height = 6;
  string status = 7;
}

message DelegatorShare {
  string delegator = 1;
  uint64 shares = 2;
  uint64 reward_index_checkpoint = 3;
  uint64 pending_rewards = 4;
  uint64 slash_index_checkpoint = 5;
}

message UnbondingEntry {
  string withdrawal_id = 1;
  string delegator = 2;
  uint64 amount = 3;
  uint64 complete_height = 4;
  string status = 5;
}

message NominatorPool {
  string pool_id = 1;
  string pool_operator = 2;
  string validator_target = 3;
  string pending_validator_target = 4;
  uint64 validator_change_height = 5;
  uint64 total_shares = 6;
  uint64 total_bonded_stake = 7;
  repeated PendingDeposit pending_deposits = 8;
  repeated PendingWithdrawal pending_withdrawals = 9;
  repeated DelegatorShare delegator_shares = 10;
  uint64 reward_index = 11;
  uint64 slash_index = 12;
  uint32 pool_commission_bps = 13;
  string status = 14;
  repeated UnbondingEntry unbonding_queue = 15;
  uint64 reward_remainder = 16;
  uint64 reward_epoch = 17;
  uint64 protocol_fee_accrued = 18;
  uint64 validator_commission_accrued = 19;
  repeated ValidatorIncome validator_operator_income = 20;
  repeated ValidatorRewardAllocation validator_allocations = 21;
}

message ValidatorRewardAllocation {
  string validator = 1;
  uint64 pool_allocated_stake = 2;
  uint64 validator_self_stake = 3;
  uint32 performance_bps = 4;
  uint32 commission_bps = 5;
  uint64 slashing_loss = 6;
  bool jailed = 7;
  uint64 infrastructure_cost = 8;
  uint32 operator_performance_bonus_bps = 9;
  uint64 gross_pool_rewards = 10;
  uint64 validator_commission = 11;
  uint64 pool_protocol_fee = 12;
  uint64 net_pool_rewards = 13;
  uint64 validator_self_stake_rewards = 14;
  uint64 operator_performance_bonus = 15;
  uint64 validator_gross_income = 16;
  int64 validator_net_income = 17;
  uint64 reward_index_delta = 18;
  uint64 reward_index_after = 19;
}

message ValidatorIncome {
  string validator = 1;
  uint64 self_stake_rewards = 2;
  uint64 commission_income = 3;
  uint64 operator_performance_bonus = 4;
  uint64 infrastructure_cost = 5;
  uint64 gross_income = 6;
  int64 net_income = 7;
}

message State {
  repeated NominatorPool pools = 1;
}

message GenesisState {
  uint64 version = 1;
  Params params = 2;
  State state = 3;
}
