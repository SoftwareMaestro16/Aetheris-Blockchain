syntax = "proto3";
package l1.fees.v1;

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/sovereign-l1/l1/x/fees/types";

message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  ProtocolFeeState protocol_fee_state = 2 [(gogoproto.nullable) = false];
  uint32 congestion_bps = 3;
}

message Params {
  repeated string allowed_fee_denoms = 1;
  string validator_rewards_ratio = 2;
  string community_pool_ratio = 3;
  string min_fee_amount = 4;
  string fee_collector_module = 5;
  string validator_rewards_target = 6;
  string community_pool_target = 7;
  string base_fee_amount = 8;
  string max_fee_amount = 9;
  uint32 target_block_utilization_bps = 10;
  uint32 congestion_threshold_bps = 11;
  uint64 max_tx_gas = 12;
  uint64 max_block_gas = 13;
  uint64 max_block_txs = 14;
  uint64 max_sender_txs_per_block = 15;
  string stake_tx_allowance_step_amount = 16;
  uint64 max_sender_txs_per_block_with_stake = 17;
  uint32 fee_priority_weight_bps = 18;
  uint32 stake_priority_weight_bps = 19;
  // target_transfer_fee_naet is the governance anchor for a standard transfer
  // fee (10,000,000 naet = 0.01 AET). All bounded surcharges and discounts are
  // expressed relative to this value.  Must be a governance/genesis parameter;
  // never hardcoded in binary logic.
  string target_transfer_fee_amount = 20;
  // congestion_surcharge_cap_bps caps the bounded_congestion_surcharge as a
  // fraction of target_transfer_fee_naet (in basis points).
  uint32 congestion_surcharge_cap_bps = 21;
  // low_reputation_premium_cap_naet caps the low_reputation_premium addend.
  string low_reputation_premium_cap_amount = 22;
  // reputation_discount_cap_naet caps the reputation discount so fees never
  // reach zero.
  string reputation_discount_cap_amount = 23;
  // storage_rent_byte_fee_amount is the fee per byte of new persistent state
  // created or enlarged by a transaction.
  string storage_rent_byte_fee_amount = 24;
  // base_fee_per_gas_amount is the current_base_fee_per_gas_naet parameter
  // used in the gas component of the full fee formula.
  string base_fee_per_gas_amount = 25;
  // byte_fee_amount is the per-byte component of the full fee formula.
  string byte_fee_amount = 26;
  // message_fee_amount is the per-message component of the full fee formula.
  string message_fee_amount = 27;
}

message ProtocolFeeState {
  repeated cosmos.base.v1beta1.Coin total_collected = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
  repeated cosmos.base.v1beta1.Coin validator_rewards = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
  repeated cosmos.base.v1beta1.Coin community_pool = 3 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
}

message ModuleBalance {
  string module_name = 1;
  string address = 2;
  repeated cosmos.base.v1beta1.Coin balance = 3 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
}
