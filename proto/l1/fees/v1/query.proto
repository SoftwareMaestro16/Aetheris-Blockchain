syntax = "proto3";
package l1.fees.v1;

import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "l1/fees/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/x/fees/types";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/l1/fees/v1/params";
  }

  rpc Accounting(QueryAccountingRequest) returns (QueryAccountingResponse) {
    option (google.api.http).get = "/l1/fees/v1/accounting";
  }

  rpc ModuleBalances(QueryModuleBalancesRequest) returns (QueryModuleBalancesResponse) {
    option (google.api.http).get = "/l1/fees/v1/module_balances";
  }

  rpc NetworkLoad(QueryNetworkLoadRequest) returns (QueryNetworkLoadResponse) {
    option (google.api.http).get = "/l1/fees/v1/network_load";
  }

  rpc EstimateFee(QueryEstimateFeeRequest) returns (QueryEstimateFeeResponse) {
    option (google.api.http).get = "/l1/fees/v1/estimate_fee";
  }
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryAccountingRequest {}

message QueryAccountingResponse {
  ProtocolFeeState protocol_fee_state = 1 [(gogoproto.nullable) = false];
}

message QueryModuleBalancesRequest {}

message QueryModuleBalancesResponse {
  repeated ModuleBalance balances = 1 [(gogoproto.nullable) = false];
}

message QueryNetworkLoadRequest {}

message QueryNetworkLoadResponse {
  uint64 block_gas_consumed = 1;
  uint64 max_block_gas = 2;
  uint32 utilization_bps = 3;
  bool congested = 4;
}

message QueryEstimateFeeRequest {
  uint64 gas_limit = 1;
}

message QueryEstimateFeeResponse {
  string required_fee = 1;
  string base_fee = 2;
  string max_fee = 3;
  uint32 utilization_bps = 4;
  bool congested = 5;
  bool at_hard_cap = 6;
}
