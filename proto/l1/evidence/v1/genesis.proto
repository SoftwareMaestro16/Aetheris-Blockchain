syntax = "proto3";

package l1.evidence.v1;

option go_package = "github.com/sovereign-l1/l1/api/l1/evidence/v1;evidencev1";

message Params {
  string authority = 1;
  uint32 max_evidence = 2;
  uint32 max_pending_evidence = 3;
  uint32 max_proof_hash_bytes = 4;
  uint32 max_payload_bytes = 5;
  uint32 max_votes = 6;
  uint32 max_side_effect_history = 7;
  uint64 evidence_ttl_blocks = 8;
  uint32 review_quorum_bps = 9;
  uint32 min_slash_fraction_bps = 10;
  uint32 max_slash_fraction_bps = 11;
  uint32 critical_fault_slash_fraction_bps = 12;
  uint64 max_reporter_reward_naet = 13;
}

message EvidenceVote {
  string voter = 1;
  string support = 2;
  uint32 voting_power_bps = 3;
  uint64 height = 4;
}

message SlashDecision {
  uint32 fraction_bps = 1;
  bool tombstone = 2;
  bool applied = 3;
}

message RewardDecision {
  string reporter = 1;
  uint64 amount_naet = 2;
  bool paid = 3;
}

message EvidenceRecord {
  string evidence_id = 1;
  string status = 2;
  string evidence_type = 3;
  string accused_validator = 4;
  string reporter = 5;
  string proof_payload_hash = 6;
  uint32 payload_size_bytes = 7;
  repeated EvidenceVote votes = 8;
  SlashDecision slash_decision = 9;
  RewardDecision reward_decision = 10;
  uint64 submitted_height = 11;
  uint64 updated_height = 12;
  uint64 expiration_height = 13;
  uint64 finalized_height = 14;
  bool requires_review = 15;
  string rejection_reason = 16;
}

message SlashEvent {
  string evidence_id = 1;
  string validator_address = 2;
  uint32 fraction_bps = 3;
  bool tombstone = 4;
  uint64 height = 5;
}

message ReporterReward {
  string evidence_id = 1;
  string reporter = 2;
  uint64 amount_naet = 3;
  bool paid = 4;
  uint64 height = 5;
}

message RegistryUpdate {
  string evidence_id = 1;
  string validator_address = 2;
  string status = 3;
  uint64 height = 4;
}

message State {
  repeated EvidenceRecord evidence = 1;
  repeated SlashEvent slash_events = 2;
  repeated ReporterReward reporter_rewards = 3;
  repeated RegistryUpdate registry_updates = 4;
  repeated string tombstoned_validators = 5;
}

message GenesisState {
  uint64 version = 1;
  Params params = 2;
  State state = 3;
}
