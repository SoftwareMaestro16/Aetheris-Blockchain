syntax = "proto3";
package l1.feecollector.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "l1/feecollector/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/x/fee-collector/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc DistributeFees(MsgDistributeFees) returns (MsgDistributeFeesResponse);
  rpc UpdateFeeDistributionParams(MsgUpdateFeeDistributionParams) returns (MsgUpdateFeeDistributionParamsResponse);
}

message MsgDistributeFees {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "l1/feecollector/MsgDistributeFees";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 epoch = 2;
}

message MsgDistributeFeesResponse {
  FeeHistoryEntry history = 1 [(gogoproto.nullable) = false];
}

message MsgUpdateFeeDistributionParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "l1/feecollector/MsgUpdateFeeDistributionParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateFeeDistributionParamsResponse {}
