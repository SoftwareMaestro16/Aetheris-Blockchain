name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - ci/**

permissions:
  contents: read

env:
  GOWORK: off
  GOFLAGS: -p=1

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

  proto:
    name: Proto Lint And Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Install proto plugins
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install github.com/cosmos/gogoproto/protoc-gen-gocosmos@v1.7.2
          go install github.com/grpc-ecosystem/grpc-gateway/protoc-gen-grpc-gateway@v1.16.0

      - name: Run buf lint
        run: buf lint

      - name: Verify proto generation
        run: |
          rm -rf .work/bufgen
          buf generate
          test -n "$(find .work/bufgen -type f -name '*.go' -print -quit)"

  build:
    name: Build orbitalisd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build node binary
        run: |
          go build -o build/orbitalisd ./cmd/l1d
          test -s build/orbitalisd

  e2e-localnet:
    name: E2E Localnet Smoke
    runs-on: windows-latest
    needs:
      - unit
      - vet
      - proto
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run localnet smoke test
        shell: pwsh
        run: .\tests\e2e\localnet_smoke.ps1 -TimeoutSeconds 90

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - unit
      - vet
      - proto
      - build
      - e2e-localnet
    if: always()
    steps:
      - name: Require all checks
        env:
          UNIT_RESULT: ${{ needs.unit.result }}
          VET_RESULT: ${{ needs.vet.result }}
          PROTO_RESULT: ${{ needs.proto.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          E2E_RESULT: ${{ needs.e2e-localnet.result }}
        run: |
          for result in "$UNIT_RESULT" "$VET_RESULT" "$PROTO_RESULT" "$BUILD_RESULT" "$E2E_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "Required CI job failed, was cancelled, or was skipped."
              exit 1
            fi
          done
